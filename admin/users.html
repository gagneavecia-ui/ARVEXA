<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="ARVEXA - Gestion des utilisateurs">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* ============================================================
       ROOT - UNIFORME AVEC ARVEXA
       ============================================================ */
    :root {
      --primary: #1A3A2A;
      --primary-dark: #0A1A12;
      --primary-light: #2A5A3A;
      --accent: #B8860B;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --success: #2D7D5A;
      --success-light: rgba(45, 125, 90, 0.1);
      --danger: #8A3A3A;
      --danger-light: rgba(138, 58, 58, 0.1);
      --warning: #D4A017;
      --bg-dark: #0A0A0A;
      --bg-surface: #141414;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --text-muted: #5A5A4A;
      --card-border: rgba(184, 134, 11, 0.06);
      --glass-bg: rgba(26, 58, 42, 0.15);
      --glass-border: rgba(184, 134, 11, 0.04);
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      opacity: 0;
      animation: pageFadeIn 0.5s ease forwards;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 80px;
    }

    @keyframes pageFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ============================================================
       BACKGROUND
       ============================================================ */
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 40% 30% at 30% 20%, rgba(26, 58, 42, 0.10) 0%, transparent 70%),
                  linear-gradient(180deg, #0A0A0A 0%, #060606 100%);
      pointer-events: none;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.15;
      animation: glowMove 10s ease-in-out infinite alternate;
    }
    .glow-1 { width: 350px; height: 350px; background: rgba(26, 58, 42, 0.15); top: -80px; right: -80px; }
    .glow-2 { width: 200px; height: 200px; background: rgba(184, 134, 11, 0.03); bottom: 0; left: 0; animation-delay: -4s; }
    .glow-3 { width: 250px; height: 250px; background: rgba(26, 58, 42, 0.08); top: 40%; left: 50%; transform: translate(-50%, -50%); animation-delay: -8s; }
    @keyframes glowMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -20px) scale(1.1); }
    }

    /* ============================================================
       HEADER - UNIFORME
       ============================================================ */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(184, 134, 11, 0.04);
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      letter-spacing: 2px;
    }
    .logo span {
      color: var(--accent);
      font-style: italic;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .admin-badge {
      background: rgba(184, 134, 11, 0.12);
      border: 1px solid rgba(184, 134, 11, 0.15);
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .admin-badge i {
      font-size: 11px;
    }

    .logout-btn {
      background: rgba(138, 58, 58, 0.1);
      border: 1px solid rgba(138, 58, 58, 0.15);
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 600;
      color: var(--danger);
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }
    .logout-btn:active {
      transform: scale(0.95);
    }
    .logout-btn:hover {
      background: rgba(138, 58, 58, 0.2);
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      font-size: 18px;
    }
    .menu-btn:active {
      transform: scale(0.94);
    }
    .menu-btn:hover {
      border-color: rgba(184, 134, 11, 0.12);
      color: var(--text-light);
    }

    /* ============================================================
       CONTAINER
       ============================================================ */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px 5% 40px;
      width: 100%;
    }

    /* ============================================================
       PAGE TITLE
       ============================================================ */
    .page-title {
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title h1 {
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 600;
      font-family: 'Playfair Display', 'Georgia', serif;
      color: var(--text-light);
    }
    .page-title h1 span {
      color: var(--accent);
      font-style: italic;
    }
    .page-title .total-users {
      font-size: 13px;
      color: var(--text-dim);
      background: var(--glass-bg);
      padding: 6px 16px;
      border-radius: 30px;
      border: 1px solid var(--glass-border);
    }
    .page-title .total-users strong {
      color: var(--accent);
      font-weight: 700;
    }

    /* ============================================================
       BARRE DE RECHERCHE
       ============================================================ */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-bar .input-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(10, 10, 10, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.06);
    }
    .search-bar .input-wrapper .icon-left {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
      z-index: 2;
    }
    .search-bar .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 44px;
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .search-bar .input-wrapper input::placeholder {
      color: var(--text-muted);
      opacity: 0.5;
    }
    .search-bar .filter-btn {
      padding: 12px 18px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-dim);
      cursor: pointer;
      transition: var(--transition);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .search-bar .filter-btn:active {
      transform: scale(0.95);
    }
    .search-bar .filter-btn:hover {
      border-color: rgba(184, 134, 11, 0.12);
      color: var(--text-light);
    }
    .search-bar .filter-btn.active {
      background: rgba(184, 134, 11, 0.08);
      border-color: rgba(184, 134, 11, 0.15);
      color: var(--accent);
    }

    /* ============================================================
       USER CARDS
       ============================================================ */
    .users-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .user-card {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: var(--transition);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      cursor: pointer;
    }
    .user-card:hover {
      border-color: rgba(184, 134, 11, 0.10);
      transform: translateY(-2px);
      background: rgba(20, 20, 20, 0.8);
    }
    .user-card:active {
      transform: scale(0.98);
    }

    .user-card .user-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 120px;
    }
    .user-card .user-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-card .user-name i {
      font-size: 14px;
      color: var(--text-muted);
    }
    .user-card .user-email {
      font-size: 12px;
      color: var(--text-dim);
    }
    .user-card .user-id {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
      letter-spacing: 0.5px;
    }

    .user-card .user-stats {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .user-card .user-stats .stat {
      text-align: center;
    }
    .user-card .user-stats .stat .value {
      font-size: 15px;
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      color: var(--accent);
    }
    .user-card .user-stats .stat .label {
      font-size: 8px;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .user-card .user-status {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-card .user-status .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-badge.active {
      background: rgba(45, 125, 90, 0.12);
      color: var(--success);
      border: 1px solid rgba(45, 125, 90, 0.15);
    }
    .status-badge.inactive {
      background: rgba(138, 58, 58, 0.12);
      color: var(--danger);
      border: 1px solid rgba(138, 58, 58, 0.15);
    }
    .status-badge.pending {
      background: rgba(212, 160, 23, 0.12);
      color: var(--warning);
      border: 1px solid rgba(212, 160, 23, 0.15);
    }

    .user-card .user-action {
      padding: 6px 14px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .user-card .user-action:active {
      transform: scale(0.95);
    }
    .user-card .user-action:hover {
      border-color: rgba(184, 134, 11, 0.12);
      color: var(--text-light);
    }
    
     /* ============================================================
       PAGINATION
       ============================================================ */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .pagination button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
    }
    .pagination button:active {
      transform: scale(0.92);
    }
    .pagination button:hover {
      border-color: rgba(184, 134, 11, 0.12);
      color: var(--text-light);
    }
    .pagination button.active {
      background: rgba(184, 134, 11, 0.08);
      border-color: rgba(184, 134, 11, 0.15);
      color: var(--accent);
      font-weight: 600;
    }
    .pagination button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ============================================================
       MODAL UTILISATEUR
       ============================================================ */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      z-index: 3000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-dialog {
      background: var(--bg-surface);
      border: 1px solid rgba(184, 134, 11, 0.12);
      border-radius: var(--radius);
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-overlay.show .modal-dialog {
      transform: scale(1) translateY(0);
    }
    .modal-dialog::-webkit-scrollbar { width: 2px; }
    .modal-dialog::-webkit-scrollbar-track { background: transparent; }
    .modal-dialog::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--card-border);
    }
    .modal-header h3 {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      color: var(--text-light);
    }
    .modal-header h3 span {
      color: var(--accent);
      font-style: italic;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .modal-close:active {
      transform: scale(0.92);
    }
    .modal-close:hover {
      border-color: rgba(184, 134, 11, 0.15);
      color: var(--text-light);
    }

    .modal-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--bg-dark);
      margin: 0 auto 16px;
    }

    .modal-field {
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    }
    .modal-field .field-label {
      font-size: 12px;
      color: var(--text-muted);
    }
    .modal-field .field-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
      text-align: right;
    }
    .modal-field .field-value .highlight {
      color: var(--accent);
    }
    .modal-field .field-value .success-text {
      color: var(--success);
    }
    .modal-field .field-value .danger-text {
      color: var(--danger);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .modal-actions button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 80px;
    }
    .modal-actions button:active {
      transform: scale(0.96);
    }
    .modal-actions .btn-toggle {
      background: rgba(184, 134, 11, 0.1);
      color: var(--accent);
      border: 1px solid rgba(184, 134, 11, 0.15);
    }
    .modal-actions .btn-toggle:hover {
      background: rgba(184, 134, 11, 0.15);
    }
    .modal-actions .btn-toggle.active {
      background: rgba(45, 125, 90, 0.1);
      color: var(--success);
      border-color: rgba(45, 125, 90, 0.15);
    }
    .modal-actions .btn-toggle.inactive {
      background: rgba(138, 58, 58, 0.1);
      color: var(--danger);
      border-color: rgba(138, 58, 58, 0.15);
    }
    .modal-actions .btn-close-modal {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-dim);
      border: 1px solid var(--card-border);
      flex: 0.5;
    }
    .modal-actions .btn-close-modal:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .modal-sub-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .modal-sub-actions button {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background: rgba(10, 10, 10, 0.3);
      color: var(--text-dim);
      cursor: pointer;
      transition: var(--transition);
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .modal-sub-actions button:active {
      transform: scale(0.95);
    }
    .modal-sub-actions button:hover {
      border-color: rgba(184, 134, 11, 0.1);
      color: var(--text-light);
    }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%;
      width: 400px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    .toast.success {
      background: #0D2A1F;
      border: 1px solid #2D7D5A;
      color: #2D7D5A;
    }
    .toast.error {
      background: #2A0D0D;
      border: 1px solid #8A3A3A;
      color: #8A3A3A;
    }
    .toast.warning {
      background: #2A1A0D;
      border: 1px solid #B8860B;
      color: #B8860B;
    }
    .toast.info {
      background: #0D1A2A;
      border: 1px solid #4A7A8A;
      color: #4A7A8A;
    }

    /* ============================================================
       MENU
       ============================================================ */
    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2000;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease, visibility 0.15s ease;
      display: flex;
      touch-action: none;
    }
    .menu-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .menu-backdrop {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(3, 3, 5, 0.5);
      backdrop-filter: blur(4px);
      cursor: default;
      touch-action: none;
      transition: backdrop-filter 0.15s ease;
    }

    .menu-sidebar {
      margin-left: auto;
      width: 75%;
      max-width: 320px;
      height: 100%;
      background: linear-gradient(180deg, #0A0A0A 0%, #141414 50%, #0A0A0A 100%);
      border-left: 1px solid rgba(184, 134, 11, 0.03);
      padding: 20px 0;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      touch-action: pan-y;
      will-change: transform;
    }
    .menu-overlay.active .menu-sidebar {
      transform: translateX(0);
    }

    .menu-link {
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 0.15s ease, transform 0.15s ease, background 0.2s ease, color 0.2s ease;
    }
    .menu-overlay.active .menu-link {
      opacity: 1;
      transform: translateX(0);
    }
    .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.02s; }
    .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.04s; }
    .menu-overlay.active .menu-link:nth-child(3) { transition-delay: 0.06s; }

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { 
    getAuth, 
    onAuthStateChanged, 
    signOut,
    setPersistence,
    browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { 
    getFirestore, 
    collection, 
    onSnapshot, 
    doc, 
    updateDoc, 
    getDoc,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  // ================================================================
  // FIREBASE CONFIG
  // ================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyBEbYuuUlNCLMBUHClv4UnyownNHw2q3_g",
    authDomain: "nexgen-39043.firebaseapp.com",
    projectId: "nexgen-39043",
    storageBucket: "nexgen-39043.firebasestorage.app",
    messagingSenderId: "619390144325",
    appId: "1:619390144325:web:35d96b125501e4e8b1782c",
    measurementId: "G-HC2Q5DNKDR"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  setPersistence(auth, browserLocalPersistence);

  // ================================================================
  // DOM ELEMENTS
  // ================================================================
  const usersGrid = document.getElementById('usersGrid');
  const totalUsersCount = document.getElementById('totalUsersCount');
  const searchInput = document.getElementById('searchInput');
  const pagination = document.getElementById('pagination');
  const toast = document.getElementById('toast');

  // Modal
  const userModal = document.getElementById('userModal');
  const modalContent = document.getElementById('modalContent');
  const modalCloseBtn = document.getElementById('modalCloseBtn');

  // Filtres
  const filterAll = document.getElementById('filterAll');
  const filterActive = document.getElementById('filterActive');
  const filterInactive = document.getElementById('filterInactive');

  // ================================================================
  // MENU
  // ================================================================
  const menuOverlay = document.getElementById('menuOverlay');
  const menuBtn = document.getElementById('menuBtn');
  const menuCloseBtn = document.getElementById('menuCloseBtn');
  const menuBackdrop = document.getElementById('menuBackdrop');

  function openMenu() {
    menuOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeMenu() {
    menuOverlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  menuBtn.addEventListener('click', (e) => {
    e.preventDefault();
    openMenu();
  });

  menuCloseBtn.addEventListener('click', closeMenu);
  menuBackdrop.addEventListener('click', closeMenu);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeMenu();
  });

  // ================================================================
  // MODAL
  // ================================================================
  let currentUserId = null;

  function openUserModal(user) {
    currentUserId = user.id;

    const statusText = user.status === 'active' ? '🟢 Actif' :
                       user.status === 'inactive' ? '🔴 Inactif' : '🟡 En attente';
    const statusClass = user.status === 'active' ? 'success-text' :
                        user.status === 'inactive' ? 'danger-text' : '';

    const initials = (user.prenom || user.nom || 'U').charAt(0).toUpperCase();

    // Compter les investissements actifs
    const investCount = user.investments ? user.investments.filter(i => i.status === 'active').length : 0;

    modalContent.innerHTML = `
      <div class="modal-avatar">${initials}</div>

      <div class="modal-field">
        <span class="field-label">👤 Nom complet</span>
        <span class="field-value">${user.fullName || user.prenom + ' ' + user.nom || 'Inconnu'}</span>
      </div>
      <div class="modal-field">
        <span class="field-label">📧 Email</span>
        <span class="field-value">${user.email || 'Non renseigné'}</span>
      </div>
      <div class="modal-field">
        <span class="field-label">🆔 ID utilisateur</span>
        <span class="field-value" style="font-family:monospace;font-size:13px;color:var(--accent);">
          ${user.uid || user.id || 'ID inconnu'}
        </span>
      </div>
      <div class="modal-field">
        <span class="field-label">💰 Solde</span>
        <span class="field-value highlight">${(user.balance || 0).toLocaleString('fr-FR')} FCFA</span>
      </div>
      <div class="modal-field">
        <span class="field-label">📊 Investissements</span>
        <span class="field-value">${investCount} actif${investCount > 1 ? 's' : ''}</span>
      </div>
      <div class="modal-field">
        <span class="field-label">📥 Total dépôts</span>
        <span class="field-value">${(user.totalDeposits || 0).toLocaleString('fr-FR')} FCFA</span>
      </div>
      <div class="modal-field">
        <span class="field-label">📤 Total retraits</span>
        <span class="field-value">${(user.totalWithdrawals || 0).toLocaleString('fr-FR')} FCFA</span>
      </div>
      <div class="modal-field">
        <span class="field-label">📅 Inscrit le</span>
        <span class="field-value">${user.createdAt ? new Date(user.createdAt).toLocaleDateString('fr-FR', {day:'2-digit', month:'long', year:'numeric'}) : 'Date inconnue'}</span>
      </div>
      <div class="modal-field">
        <span class="field-label">📌 Statut</span>
        <span class="field-value ${statusClass}">${statusText}</span>
      </div>

      <div class="modal-actions">
        <button class="btn-toggle ${user.status === 'active' ? 'active' : 'inactive'}" id="toggleStatusBtn">
          <i class="fas ${user.status === 'active' ? 'fa-pause' : 'fa-play'}"></i>
          ${user.status === 'active' ? 'Désactiver' : 'Activer'}
        </button>
        <button class="btn-close-modal" id="modalCloseActionBtn">
          <i class="fas fa-times"></i> Fermer
        </button>
      </div>
    `;

    // Écouteurs des boutons du modal
    document.getElementById('toggleStatusBtn').addEventListener('click', () => {
      if (currentUserId) {
        const newStatus = user.status === 'active' ? 'inactive' : 'active';
        handleToggleStatus(currentUserId, newStatus);
      }
    });

    document.getElementById('modalCloseActionBtn').addEventListener('click', closeModal);

    userModal.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    userModal.classList.remove('show');
    document.body.style.overflow = '';
    currentUserId = null;
  }

  modalCloseBtn.addEventListener('click', closeModal);
  userModal.addEventListener('click', (e) => {
    if (e.target === userModal) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ================================================================
  // TOAST
  // ================================================================
  function showToast(message, type = 'success') {
    toast.textContent = message;
    toast.className = `toast ${type}`;
    setTimeout(() => toast.classList.add('show'), 50);
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  // ================================================================
  // TOGGLE STATUS
  // ================================================================
  async function handleToggleStatus(userId, newStatus) {
    const action = newStatus === 'active' ? 'activer' : 'désactiver';
    if (!confirm(`Voulez-vous ${action} cet utilisateur ?`)) return;

    try {
      const userRef = doc(db, 'users', userId);
      await updateDoc(userRef, { 
        status: newStatus,
        statusUpdatedAt: new Date().toISOString(),
        statusUpdatedBy: auth.currentUser?.uid || 'admin'
      });
      showToast(`✅ Utilisateur ${action} avec succès`, 'success');
    } catch (error) {
      console.error('Erreur changement statut:', error);
      showToast(`❌ Erreur lors du changement de statut`, 'error');
    }
  }

  // ================================================================
  // ETAT
  // ================================================================
  let allUsers = [];
  let filteredUsers = [];
  let currentPage = 1;
  const USERS_PER_PAGE = 10;
  let currentFilter = 'all';
  let searchQuery = '';

  // ================================================================
  // RENDER USERS
  // ================================================================
  function renderUsers() {
    // Appliquer le filtre
    let users = allUsers;

    // Filtre par statut
    if (currentFilter === 'active') {
      users = users.filter(u => u.status === 'active');
    } else if (currentFilter === 'inactive') {
      users = users.filter(u => u.status === 'inactive' || u.status === 'pending');
    }

    // Recherche
    if (searchQuery.trim()) {
      const query = searchQuery.toLowerCase().trim();
      users = users.filter(u => {
        const fullName = (u.fullName || u.prenom + ' ' + u.nom || '').toLowerCase();
        const email = (u.email || '').toLowerCase();
        return fullName.includes(query) || email.includes(query);
      });
    }

    filteredUsers = users;
    totalUsersCount.textContent = users.length;

    // Pagination
    const totalPages = Math.ceil(users.length / USERS_PER_PAGE);
    if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

    const start = (currentPage - 1) * USERS_PER_PAGE;
    const end = start + USERS_PER_PAGE;
    const pageUsers = users.slice(start, end);

    // Rendu des cartes
    if (pageUsers.length === 0) {
      usersGrid.innerHTML = `
        <div style="text-align:center;padding:40px 20px;color:var(--text-dim);">
          <i class="fas fa-users" style="font-size:40px;opacity:0.2;display:block;margin-bottom:12px;"></i>
          <p>Aucun utilisateur trouvé</p>
        </div>
      `;
    } else {
      usersGrid.innerHTML = pageUsers.map((user, index) => {
        const statusClass = user.status === 'active' ? 'active' : 
                           (user.status === 'inactive' ? 'inactive' : 'pending');
        const statusLabel = user.status === 'active' ? 'Actif' : 
                           (user.status === 'inactive' ? 'Inactif' : 'En attente');
        const balance = user.balance || 0;
        const investCount = user.investments ? user.investments.filter(i => i.status === 'active').length : 0;

        return `
          <div class="user-card" data-user='${JSON.stringify(user)}'>
            <div class="user-info">
              <div class="user-name">
                <i class="fas fa-user-circle"></i>
                ${user.fullName || user.prenom + ' ' + user.nom || 'Inconnu'}
              </div>
              <div class="user-email">${user.email || 'Email non renseigné'}</div>
              <div class="user-id">🆔 ${user.uid || user.id || 'ID inconnu'}</div>
            </div>
            <div class="user-stats">
              <div class="stat">
                <div class="value">${balance.toLocaleString('fr-FR')}</div>
                <div class="label">Solde</div>
              </div>
              <div class="stat">
                <div class="value">${investCount}</div>
                <div class="label">Invest.</div>
              </div>
            </div>
            <div class="user-status">
              <span class="status-badge ${statusClass}">${statusLabel}</span>
              <button class="user-action" data-id="${user.id}">
                <i class="fas fa-chevron-right"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');

      // Écouteurs pour ouvrir le modal
      document.querySelectorAll('.user-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.user-action')) return;
          const userData = card.dataset.user;
          if (userData) {
            try {
              const user = JSON.parse(userData);
              openUserModal(user);
            } catch (err) {
              console.error('Erreur parsing utilisateur:', err);
            }
          }
        });
      });

      document.querySelectorAll('.user-action').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          const user = allUsers.find(u => u.id === id || u.uid === id);
          if (user) openUserModal(user);
        });
      });
    }

    // Pagination
    renderPagination(totalPages);
  }

  // ================================================================
  // RENDER PAGINATION
  // ================================================================
  function renderPagination(totalPages) {
    if (totalPages <= 1) {
      pagination.innerHTML = '';
      return;
    }

    let html = '';
    html += `<button class="prev" ${currentPage <= 1 ? 'disabled' : ''}>&lt;</button>`;

    for (let i = 1; i <= totalPages; i++) {
      if (i === currentPage) {
        html += `<button class="active">${i}</button>`;
      } else if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
        html += `<button>${i}</button>`;
      } else if (i === currentPage - 2 || i === currentPage + 2) {
        html += `<span style="color:var(--text-muted);align-self:center;">…</span>`;
      }
    }

    html += `<button class="next" ${currentPage >= totalPages ? 'disabled' : ''}>&gt;</button>`;
    pagination.innerHTML = html;

    pagination.querySelectorAll('button:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('prev') && currentPage > 1) {
          currentPage--;
          renderUsers();
        } else if (btn.classList.contains('next') && currentPage < totalPages) {
          currentPage++;
          renderUsers();
        } else if (!btn.classList.contains('prev') && !btn.classList.contains('next')) {
          const page = parseInt(btn.textContent);
          if (!isNaN(page) && page !== currentPage) {
            currentPage = page;
            renderUsers();
          }
        }
      });
    });
  }

  // ================================================================
  // LISTEN USERS
  // ================================================================
  let unsubscribeUsers = null;

  function listenUsers() {
    if (unsubscribeUsers) unsubscribeUsers();

    const q = query(collection(db, 'users'), orderBy('createdAt', 'desc'));

    unsubscribeUsers = onSnapshot(q, (snapshot) => {
      allUsers = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        allUsers.push({
          id: doc.id,
          ...data
        });
      });
      renderUsers();
    }, (error) => {
      console.error('Erreur chargement utilisateurs:', error);
    });
  }

  // ================================================================
  // FILTRES ET RECHERCHE
  // ================================================================
  function setFilter(filter) {
    currentFilter = filter;
    currentPage = 1;

    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    if (filter === 'all') filterAll.classList.add('active');
    else if (filter === 'active') filterActive.classList.add('active');
    else if (filter === 'inactive') filterInactive.classList.add('active');

    renderUsers();
  }

  filterAll.addEventListener('click', () => setFilter('all'));
  filterActive.addEventListener('click', () => setFilter('active'));
  filterInactive.addEventListener('click', () => setFilter('inactive'));

  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    currentPage = 1;
    renderUsers();
  });

  // ================================================================
  // LOGOUT
  // ================================================================
  async function handleLogout() {
    if (confirm('Voulez-vous vous déconnecter ?')) {
      try {
        await signOut(auth);
        localStorage.removeItem('ARVEXA_current_user');
        window.location.href = '../login.html';
      } catch (error) {
        console.error('Erreur déconnexion:', error);
        showToast('❌ Erreur lors de la déconnexion', 'error');
      }
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', handleLogout);
  document.getElementById('menuLogoutBtn').addEventListener('click', handleLogout);

  // ================================================================
  // AUTH
  // ================================================================
  const ADMIN_EMAIL = 'gagneavecia@gmail.com';

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = '../login.html';
      return;
    }

    if (user.email !== ADMIN_EMAIL) {
      alert('⛔ Accès non autorisé. Cette page est réservée à l\'administrateur.');
      await signOut(auth);
      window.location.href = '../index.html';
      return;
    }

    document.getElementById('menuUsername').textContent = user.email.split('@')[0] || 'Admin';
    document.getElementById('menuUseremail').textContent = user.email;
    document.getElementById('menuAvatar').textContent = user.email.charAt(0).toUpperCase();

    listenUsers();
  });

  console.log('✅ ARVEXA - Gestion des utilisateurs chargée');
</script>
</body>
</html>
