                            if (result.success) {
                                Notifications.show('Opération supprimée', 'warning');
                                this.renderPage('operations');
                            }
                        }
                    });
                });
            },

            renderRapports(container, user) {
                const ops = user.operations || [];

                container.innerHTML = `
                            <div class="card" style="margin-bottom:1.5rem;">
                                <div class="card-header">
                                    <h2><i class="fas fa-chart-pie"></i> <span data-i18n="report.title">Rapport financier</span></h2>
                                </div>
                                <div class="report-filters">
                                    <select id="reportPeriod">
                                        <option value="day" data-i18n="report.day">Aujourd'hui</option>
                                        <option value="week" selected data-i18n="report.week">Cette semaine</option>
                                        <option value="month" data-i18n="report.month">Ce mois</option>
                                        <option value="year" data-i18n="report.year">Cette année</option>
                                        <option value="all" data-i18n="report.all">Total général</option>
                                    </select>
                                    <button class="btn btn-primary btn-sm" id="generateReport">
                                        <i class="fas fa-sync"></i> <span data-i18n="report.analyze">Analyser</span>
                                    </button>
                                </div>
                            </div>

                            <div id="reportContent"></div>
                        `;

                document.getElementById('generateReport').addEventListener('click', () => {
                    const period = document.getElementById('reportPeriod').value;
                    this.generateReport(container, user, period);
                });

                setTimeout(() => {
                    document.getElementById('generateReport').click();
                }, 100);
            },

            generateReport(container, user, period) {
                const ops = user.operations || [];
                const report = IA.getReport(ops, user.balance, period);

                const content = document.getElementById('reportContent');
                content.innerHTML = `
                            <div class="grid-3">
                                <div class="stat-card positive">
                                    <div class="stat-icon green">
                                        <i class="fas fa-arrow-down"></i>
                                    </div>
                                    <div class="stat-value">${this.formatCurrency(report.stats.totalDeposits)}</div>
                                    <div class="stat-label">Total dépôts (${report.periodLabel})</div>
                                </div>
                                <div class="stat-card negative">
                                    <div class="stat-icon red">
                                        <i class="fas fa-arrow-up"></i>
                                    </div>
                                    <div class="stat-value">${this.formatCurrency(report.stats.totalWithdraws)}</div>
                                    <div class="stat-label">Total retraits (${report.periodLabel})</div>
                                </div>
                                <div class="stat-card ${report.stats.net >= 0 ? 'positive' : 'negative'}">
                                    <div class="stat-icon ${report.stats.net >= 0 ? 'green' : 'red'}">
                                        <i class="fas fa-${report.stats.net >= 0 ? 'chart-line' : 'chart-line'}"></i>
                                    </div>
                                    <div class="stat-value ${report.stats.net >= 0 ? '' : 'negative'}">${this.formatCurrency(report.stats.net)}</div>
                                    <div class="stat-label">Bénéfice/Perte</div>
                                </div>
                            </div>

                            <div class="report-card">
                                <div class="report-title"><i class="fas fa-robot"></i> Analyses IA - ${report.periodLabel}</div>
                                ${report.insights.length === 0 ? '<p>Aucune analyse disponible</p>' :
                                    report.insights.map(ins => `
                                        <div class="ia-insight ${ins.type}">
                                            <div class="ia-label">
                                                <i class="fas ${ins.icon}"></i> ${ins.title}
                                            </div>
                                            <div class="ia-text">${ins.text}</div>
                                        </div>
                                    `).join('')
                                }
                            </div>

                            <div class="report-card">
                                <div class="report-title"><i class="fas fa-chart-bar"></i> Répartition par catégorie</div>
                                <div class="chart-wrapper">
                                    <canvas id="reportChart"></canvas>
                                </div>
                            </div>

                            <div class="report-card">
                                <div class="report-title"><i class="fas fa-info-circle"></i> Détails</div>
                                <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;">
                                    <div><strong>Période :</strong> ${report.periodLabel}</div>
                                    <div><strong>Nombre d'opérations :</strong> ${report.totalOperations}</div>
                                    <div><strong>Solde actuel :</strong> ${this.formatCurrency(report.balance)}</div>
                                    <div><strong>Moyenne dépôt :</strong> ${this.formatCurrency(report.stats.averageDeposit)}</div>
                                    <div><strong>Moyenne retrait :</strong> ${this.formatCurrency(report.stats.averageWithdraw)}</div>
                                </div>
                            </div>
                        `;

                setTimeout(() => {
                    Charts.render('reportChart', ops, 'bar');
                }, 100);
            }
        };

        // ==========================================
        // 10. DÉMARRAGE
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            App.init();

            window.addEventListener('online', () => {
                Notifications.show('Vous êtes de nouveau en ligne', 'success');
            });
            window.addEventListener('offline', () => {
                Notifications.show('Vous êtes hors ligne - les données restent disponibles', 'warning');
            });
        });
    </script>
</body>
</html>
